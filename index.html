<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>アトリエ魔法陣 完全自由配置エディタ</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    body {
      margin: 0; padding: 10px; background-color: #f4eade; color: #1a2b4c;
      font-family: 'Times New Roman', serif;
    }
    .app-container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
    
    h1 { font-size: 1.1rem; margin: 0 0 5px 0; border-bottom: 2px solid #1a2b4c; letter-spacing: 1px; }
    
    /* キャンバスはスワイプスクロール禁止 (touch-action: none) */
    .canvas-wrapper {
      width: 100%; height: 400px; background: #fffaf0;
      border: 2px solid #1a2b4c; border-radius: 4px; position: relative;
      touch-action: none; overflow: hidden;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
    }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    .camera-controls { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: bold; padding: 5px; background: #e8dbce; border-radius: 4px; border: 1px solid #d4c5b0; }
    .camera-controls input[type="range"] { flex: 1; accent-color: #1a2b4c; }

    .panel-title { font-size: 0.85rem; font-weight: bold; border-left: 3px solid #1a2b4c; padding-left: 5px; margin: 10px 0 5px 0; }
    
    .palette { display: flex; flex-wrap: wrap; gap: 5px; }
    .btn {
      background: #e8dbce; color: #1a2b4c; border: 1px solid #1a2b4c;
      padding: 8px 12px; font-size: 0.8rem; border-radius: 4px; cursor: pointer;
    }
    .btn:active { background: #1a2b4c; color: #fff; }
    .btn-action { background: #1a2b4c; color: #fff; }
    .btn-action:active { background: #e8dbce; color: #1a2b4c; }
    .btn-danger { background: #fff; color: #c0392b; border-color: #c0392b; }
    .btn-danger:active { background: #c0392b; color: #fff; }
    .btn-magic { background: #e74c3c; color: #fff; border-color: #c0392b; font-weight: bold; }
    
    .inspector { background: #e8dbce; padding: 12px; border-radius: 6px; border: 1px solid #d4c5b0; }
    .inspector.disabled { opacity: 0.5; pointer-events: none; }
    .slider-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; }
    .slider-row input[type="range"] { flex: 1; margin: 0 10px; accent-color: #1a2b4c; }
    
    .utils { display: flex; gap: 5px; margin: 10px 0; }
  </style>
</head>
<body>

  <div class="app-container">
    <h1>MAGIC CIRCLE ATELIER v6</h1>
    
    <div class="camera-controls">
      <span>🔍 ズーム</span>
      <input type="range" id="camZoom" min="0.3" max="3.0" step="0.1" value="1">
      <button class="btn" id="btnResetCam" style="padding:4px 8px;">リセット</button>
    </div>

    <!-- キャンバス領域（ピンチイン・アウト対応） -->
    <div class="canvas-wrapper">
      <canvas id="magicCanvas"></canvas>
    </div>

    <!-- インスペクター（選択したオブジェクトの調整） -->
    <div class="inspector disabled" id="inspectorPanel">
      <div style="font-weight:bold; margin-bottom:10px; font-size:0.9rem;">■ 選択中のパーツを調整</div>
      <div class="slider-row">
        <span>大きさ</span>
        <input type="range" id="valScale" min="0.2" max="4.0" step="0.1" value="1">
      </div>
      <div class="slider-row">
        <span>矢の長さ</span>
        <input type="range" id="valLength" min="20" max="300" step="5" value="80">
      </div>
      <div class="slider-row">
        <span>回転角</span>
        <input type="range" id="valRotation" min="0" max="360" step="1" value="0">
      </div>
      
      <button class="btn btn-action" id="btnToggleRing" style="width:100%; margin-bottom:5px; display:none;">陣を閉じる (発動)</button>
      <button class="btn btn-danger" id="btnDeleteSelected" style="width:100%;">選択を削除</button>
    </div>

    <div class="utils">
      <button class="btn btn-action" id="btnAlignArrows" style="flex:1;">矢を円形に均等配置</button>
      <button class="btn btn-danger" id="btnClear">全消去</button>
    </div>

    <div class="panel-title">陣 (外枠)</div>
    <div class="palette">
      <button class="btn" onclick="addElement('ring', 'normal')">陣を追加</button>
    </div>

    <div class="panel-title">紋 (中央・性質)</div>
    <div class="palette">
      <button class="btn" onclick="addElement('crest', 'fire')">炎</button>
      <button class="btn" onclick="addElement('crest', 'water')">水</button>
      <button class="btn" onclick="addElement('crest', 'wind')">風</button>
      <button class="btn" onclick="addElement('crest', 'light')">光</button>
      <button class="btn" onclick="addElement('crest', 'earth')">大地</button>
    </div>

    <div class="panel-title">矢 (周囲・形状)</div>
    <div class="palette">
      <button class="btn" onclick="addElement('arrow', 'pillar')">柱</button>
      <button class="btn" onclick="addElement('arrow', 'float')">浮遊</button>
      <button class="btn" onclick="addElement('arrow', 'converge')">収束</button>
      <button class="btn" onclick="addElement('arrow', 'scatter')">拡散</button>
      <button class="btn" onclick="addElement('arrow', 'crush')">破砕</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('magicCanvas');
    const ctx = canvas.getContext('2d');
    
    // カメラ（ズームとパン）
    let camera = { x: 0, y: 0, zoom: 1 };
    
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      drawScene();
    }
    window.addEventListener('resize', resizeCanvas);

    // --- オブジェクト管理 ---
    let elements = [];
    let selectedElement = null;
    let dragging = false;
    let draggingCamera = false;
    let dragOffset = { x: 0, y: 0 }; 

    function addElement(category, type) {
      const el = {
        id: Date.now(),
        category: category,
        type: type,
        x: 0 - camera.x,
        y: 0 - camera.y,
        scale: 1.0,
        rotation: 0,
        length: category === 'arrow' ? 80 : 0,
        isClosed: false 
      };
      el.x += (Math.random() * 20 - 10);
      el.y += (Math.random() * 20 - 10);
      elements.push(el);
      selectElement(el);
      drawScene();
    }

    // --- 【修正版】描画パス定義 ---
    const drawPaths = {
      // 【陣】
      ring_normal: (ctx, el) => {
        const r = 100 * el.scale;
        const start = el.isClosed ? 0 : Math.PI * 0.15;
        const end = el.isClosed ? Math.PI * 2 : Math.PI * 1.85;
        ctx.beginPath(); ctx.arc(0, 0, r, start, end); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, r * 0.92, start, end); ctx.stroke();
        
        if (el.isClosed) {
          ctx.save();
          ctx.fillStyle = "#e74c3c"; ctx.font = `bold ${16*el.scale}px sans-serif`;
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText("✨ 魔法発動 ✨", 0, -r*1.2);
          ctx.restore();
        }
      },
      // 【紋】
      crest_fire: (ctx, el) => {
        const r = 25 * el.scale;
        const L = r * Math.sqrt(3); // 正三角形の1辺の長さ
        const halfL = L / 2;
        
        // 1. 正三角形
        ctx.beginPath();
        ctx.moveTo(0, -r); ctx.lineTo(-L/2, r/2); ctx.lineTo(L/2, r/2);
        ctx.closePath(); ctx.stroke();
        
        // 2. 各辺の中心から中心へ伸びる辺の半分の長さの線
        // 底辺の中心から上へ
        ctx.beginPath(); ctx.moveTo(0, r/2); ctx.lineTo(0, r/2 - halfL); ctx.stroke();
        
        // 左斜辺の中心から右下へ
        const dx = halfL * Math.cos(Math.PI/6);
        const dy = halfL * Math.sin(Math.PI/6);
        ctx.beginPath(); ctx.moveTo(-L/4, -r/4); ctx.lineTo(-L/4 + dx, -r/4 + dy); ctx.stroke();
        
        // 右斜辺の中心から左下へ
        ctx.beginPath(); ctx.moveTo(L/4, -r/4); ctx.lineTo(L/4 - dx, -r/4 + dy); ctx.stroke();
      },
      crest_water: (ctx, el) => {
        const r = 22 * el.scale;
        // 1. 中央のS字
        ctx.beginPath();
        ctx.arc(0, -r/2, r/2, Math.PI*1.5, Math.PI*-0.5, true);
        ctx.arc(0, r/2, r/2, Math.PI*1.5, Math.PI*-0.5, false);
        ctx.stroke();
        
        // 2. 上下逆の水滴を左右に
        function drawUpsideDownTeardrop(cx, cy, size) {
            ctx.beginPath();
            ctx.arc(cx, cy - size*0.3, size*0.5, Math.PI, 0); // 丸い部分が上
            ctx.lineTo(cx, cy + size); // 尖った部分が下
            ctx.closePath(); ctx.stroke();
        }
        drawUpsideDownTeardrop(-r*1.6, 0, r*0.7);
        drawUpsideDownTeardrop(r*1.6, 0, r*0.7);
      },
      crest_light: (ctx, el) => {
        const r = 22 * el.scale;
        // 1. 外側に正四角形
        ctx.beginPath(); ctx.rect(-r, -r, r*2, r*2); ctx.stroke();
        // 2. 内側にひし形
        ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0); ctx.closePath(); ctx.stroke();
        
        // 3. 各辺の中心から外側に伸びる辺の半分の長さ(r)の線
        ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(0, -r - r); ctx.stroke(); // 上
        ctx.beginPath(); ctx.moveTo(0, r); ctx.lineTo(0, r + r); ctx.stroke(); // 下
        ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(-r - r, 0); ctx.stroke(); // 左
        ctx.beginPath(); ctx.moveTo(r, 0); ctx.lineTo(r + r, 0); ctx.stroke(); // 右
      },
      crest_wind: (ctx, el) => {
        const r = 22 * el.scale;
        // 1. 両端がくるくる巻いたS字
        ctx.beginPath();
        ctx.arc(0, -r*0.4, r*0.4, Math.PI*1.5, Math.PI*0.5, true);
        ctx.arc(0, r*0.4, r*0.4, Math.PI*1.5, Math.PI*0.5, false);
        ctx.stroke();
        ctx.beginPath(); ctx.arc(0, -r*0.8, r*0.15, Math.PI*1.5, Math.PI*3.5); ctx.stroke(); // 上の渦
        ctx.beginPath(); ctx.arc(0, r*0.8, r*0.15, Math.PI*0.5, Math.PI*2.5); ctx.stroke(); // 下の渦
        
        // 2. 左右に「小」のハネてないやつ（外向きに）
        function drawSho(cx, cy, dir) {
            ctx.save(); ctx.translate(cx, cy); ctx.rotate(dir);
            // 中心線
            ctx.beginPath(); ctx.moveTo(0, r*0.6); ctx.lineTo(0, -r*0.6); ctx.stroke();
            // 左右の点（跳ねない）
            ctx.beginPath(); ctx.moveTo(-r*0.3, 0); ctx.lineTo(-r*0.5, -r*0.3); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(r*0.3, 0); ctx.lineTo(r*0.5, -r*0.3); ctx.stroke();
            ctx.restore();
        }
        drawSho(-r*1.5, 0, -Math.PI/2); // 左へ向く
        drawSho(r*1.5, 0, Math.PI/2);  // 右へ向く
      },
      crest_earth: (ctx, el) => {
        const r = 30 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(-r*0.8, 0); ctx.lineTo(0, r); ctx.lineTo(r*0.8, 0); ctx.closePath(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-r*0.4, -r*0.5); ctx.lineTo(r*0.4, -r*0.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-r*0.4, r*0.5); ctx.lineTo(r*0.4, r*0.5); ctx.stroke();
      },
      // 【矢】
      arrow_pillar: (ctx, el) => {
        const l = el.length; const w = 15 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-w, -l); ctx.lineTo(w, -l); ctx.stroke();
      },
      arrow_float: (ctx, el) => {
        const l = el.length; const w = 20 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-w, -l); ctx.quadraticCurveTo(0, -l-w, w, -l); ctx.stroke();
      },
      arrow_converge: (ctx, el) => {
        const l = el.length; const w = 15 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-w, -l - w); ctx.lineTo(0, -l); ctx.lineTo(w, -l - w); ctx.stroke();
      },
      arrow_scatter: (ctx, el) => {
        const l = el.length; const w = 15 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l + w); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -l + w); ctx.lineTo(-w, -l); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -l + w); ctx.lineTo(w, -l); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -l + w); ctx.lineTo(0, -l - w*0.5); ctx.stroke();
      },
      arrow_crush: (ctx, el) => {
        const l = el.length; const w = 15 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l + w*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -l + w*2); ctx.lineTo(-w, -l + w); ctx.lineTo(w, -l); ctx.lineTo(0, -l - w); ctx.stroke();
      }
    };

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      
      // カメラ適用
      ctx.translate(canvas.width / 2 + camera.x, canvas.height / 2 + camera.y);
      ctx.scale(camera.zoom, camera.zoom);
      
      // 背景グリッド
      ctx.strokeStyle = "rgba(212, 197, 176, 0.4)"; ctx.lineWidth = 1/camera.zoom;
      const gw = canvas.width / camera.zoom * 2; const gh = canvas.height / camera.zoom * 2;
      for(let i = -gw; i < gw; i+=30) { ctx.beginPath(); ctx.moveTo(i, -gh); ctx.lineTo(i, gh); ctx.stroke(); }
      for(let i = -gh; i < gh; i+=30) { ctx.beginPath(); ctx.moveTo(-gw, i); ctx.lineTo(gw, i); ctx.stroke(); }

      ctx.lineCap = 'round'; ctx.lineJoin = 'round';

      elements.forEach(el => {
        ctx.save();
        ctx.translate(el.x, el.y);
        ctx.rotate(el.rotation * Math.PI / 180);

        const isSel = (selectedElement && selectedElement.id === el.id);
        if (isSel) {
          ctx.shadowBlur = 8 / camera.zoom;
          ctx.shadowColor = "#e74c3c";
          ctx.strokeStyle = el.isClosed ? "#27ae60" : "#e74c3c";
          ctx.fillStyle = "rgba(231, 76, 60, 0.2)";
          ctx.beginPath(); ctx.arc(0, 0, 15/camera.zoom, 0, Math.PI*2); ctx.fill();
        } else {
          ctx.shadowBlur = 0;
          ctx.strokeStyle = el.isClosed ? "#27ae60" : "#1a2b4c"; 
        }

        ctx.lineWidth = (el.category === 'ring' ? 2 : 1.5) / camera.zoom;
        const drawKey = `${el.category}_${el.type}`;
        if (drawPaths[drawKey]) drawPaths[drawKey](ctx, el);

        ctx.restore();
      });
      ctx.restore();
    }

    // --- UI連動 ---
    const panel = document.getElementById('inspectorPanel');
    const sScale = document.getElementById('valScale');
    const sLength = document.getElementById('valLength');
    const sRot = document.getElementById('valRotation');
    const btnToggleRing = document.getElementById('btnToggleRing');

    function selectElement(el) {
      selectedElement = el;
      if (el) {
        panel.classList.remove('disabled');
        sScale.value = el.scale;
        sLength.value = el.length;
        sRot.value = el.rotation;
        sLength.disabled = (el.category !== 'arrow');
        
        if (el.category === 'ring') {
            btnToggleRing.style.display = 'block';
            btnToggleRing.textContent = el.isClosed ? "陣を開く" : "陣を閉じる (発動)";
            btnToggleRing.className = el.isClosed ? "btn btn-danger" : "btn btn-magic";
        } else {
            btnToggleRing.style.display = 'none';
        }
      } else {
        panel.classList.add('disabled');
        btnToggleRing.style.display = 'none';
      }
      drawScene();
    }

    sScale.oninput = e => { if(selectedElement) { selectedElement.scale = parseFloat(e.target.value); drawScene(); } };
    sLength.oninput = e => { if(selectedElement) { selectedElement.length = parseFloat(e.target.value); drawScene(); } };
    sRot.oninput = e => { if(selectedElement) { selectedElement.rotation = parseFloat(e.target.value); drawScene(); } };

    btnToggleRing.onclick = () => {
        if(selectedElement && selectedElement.category === 'ring') {
            selectedElement.isClosed = !selectedElement.isClosed;
            selectElement(selectedElement);
        }
    };

    document.getElementById('btnDeleteSelected').onclick = () => {
      if (selectedElement) { elements = elements.filter(e => e.id !== selectedElement.id); selectElement(null); }
    };
    document.getElementById('btnClear').onclick = () => { elements = []; selectElement(null); };

    // --- カメラ操作 ---
    const camZoom = document.getElementById('camZoom');
    function setZoom(val) {
      camera.zoom = Math.min(Math.max(0.3, val), 3.0);
      camZoom.value = camera.zoom;
      drawScene();
    }
    camZoom.oninput = e => setZoom(parseFloat(e.target.value));
    document.getElementById('btnResetCam').onclick = () => { camera = { x: 0, y: 0, zoom: 1 }; camZoom.value = 1; drawScene(); };

    // ピンチズーム＆ホイールズーム対応
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      setZoom(camera.zoom - e.deltaY * 0.001);
    }, {passive: false});

    let initialPinchDist = null;
    let initialZoom = 1;

    function getWorldPos(cx, cy) {
      const rect = canvas.getBoundingClientRect();
      const x = cx - rect.left - canvas.width / 2 - camera.x;
      const y = cy - rect.top - canvas.height / 2 - camera.y;
      return { x: x / camera.zoom, y: y / camera.zoom };
    }

    canvas.addEventListener('pointerdown', e => {
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const wPos = getWorldPos(cx, cy);
      
      let hit = null;
      for (let i = elements.length - 1; i >= 0; i--) {
        const el = elements[i];
        const dist = Math.hypot(wPos.x - el.x, wPos.y - el.y);
        
        if (el.category === 'ring') {
            const outer = 115 * el.scale;
            const inner = 85 * el.scale;
            if (dist >= inner && dist <= outer) { hit = el; break; }
        } else if (el.category === 'arrow') {
            if (dist < 40 / camera.zoom) { hit = el; break; }
        } else {
            if (dist < 40 * el.scale) { hit = el; break; }
        }
      }
      
      selectElement(hit);
      
      if (hit) {
        dragging = true; draggingCamera = false;
        dragOffset.x = wPos.x - hit.x;
        dragOffset.y = wPos.y - hit.y;
      } else {
        dragging = false; draggingCamera = true;
        const rect = canvas.getBoundingClientRect();
        dragOffset.x = (cx - rect.left) - camera.x;
        dragOffset.y = (cy - rect.top) - camera.y;
      }
    });

    canvas.addEventListener('pointermove', e => {
      e.preventDefault(); // スワイプでのブラウザバックや更新を防止
      
      // ピンチズーム処理
      if (e.touches && e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (initialPinchDist === null) {
            initialPinchDist = dist;
            initialZoom = camera.zoom;
        } else {
            setZoom(initialZoom * (dist / initialPinchDist));
        }
        return;
      }

      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;

      if (dragging && selectedElement) {
        const wPos = getWorldPos(cx, cy);
        selectedElement.x = wPos.x - dragOffset.x;
        selectedElement.y = wPos.y - dragOffset.y;
        drawScene();
      } else if (draggingCamera) {
        const rect = canvas.getBoundingClientRect();
        camera.x = (cx - rect.left) - dragOffset.x;
        camera.y = (cy - rect.top) - dragOffset.y;
        drawScene();
      }
    });

    canvas.addEventListener('pointerup', e => { 
        dragging = false; draggingCamera = false; 
        if (!e.touches || e.touches.length < 2) initialPinchDist = null;
    });
    canvas.addEventListener('pointerleave', () => { dragging = false; draggingCamera = false; initialPinchDist = null; });

    document.getElementById('btnAlignArrows').onclick = () => {
      const cx = 0 - camera.x; const cy = 0 - camera.y;
      const arrows = elements.filter(e => e.category === 'arrow');
      if (arrows.length === 0) return;
      const angleStep = 360 / arrows.length;
      arrows.forEach((arr, i) => { arr.x = cx; arr.y = cy; arr.rotation = i * angleStep; });
      elements.filter(e => e.category !== 'arrow').forEach(e => { e.x = cx; e.y = cy; });
      if(selectedElement) selectElement(selectedElement);
      drawScene();
    };

    setTimeout(resizeCanvas, 100);
  </script>
</body>
</html>
