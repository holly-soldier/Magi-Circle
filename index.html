<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>アトリエ魔法陣 自由配置エディタ</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }
    body {
      margin: 0; background-color: #f4eade; color: #1a2b4c;
      font-family: 'Times New Roman', serif; display: flex; flex-direction: column; align-items: center;
      height: 100vh; overflow: hidden;
    }
    h1 { font-size: 1rem; margin: 8px 0; border-bottom: 2px solid #1a2b4c; letter-spacing: 1px; }
    
    .app-container { display: flex; flex-direction: column; width: 100%; max-width: 400px; height: 100%; }
    
    /* キャンバス領域 */
    .canvas-wrapper {
      position: relative; width: 100%; aspect-ratio: 1/1; 
      background: #fffaf0; border-top: 2px solid #1a2b4c; border-bottom: 2px solid #1a2b4c;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
    }
    canvas { display: block; width: 100%; height: 100%; }

    /* コントロール領域 */
    .controls { flex: 1; overflow-y: auto; padding: 10px; background: #faf4eb; }
    
    .panel-title { font-size: 0.85rem; font-weight: bold; border-left: 3px solid #1a2b4c; padding-left: 5px; margin-bottom: 5px; margin-top: 10px; }
    
    .palette { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .btn {
      background: #e8dbce; color: #1a2b4c; border: 1px solid #1a2b4c;
      padding: 6px 10px; font-size: 0.8rem; border-radius: 4px; cursor: pointer;
    }
    .btn:active { background: #1a2b4c; color: #fff; }
    
    /* スライダー（インスペクター） */
    .inspector { background: #e8dbce; padding: 10px; border-radius: 6px; border: 1px solid #d4c5b0; margin-bottom: 10px; }
    .inspector.disabled { opacity: 0.5; pointer-events: none; }
    .slider-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; margin-bottom: 6px; }
    .slider-row input[type="range"] { flex: 1; margin: 0 10px; accent-color: #1a2b4c; }
    
    /* ユーティリティ */
    .utils { display: flex; gap: 5px; margin-bottom: 20px; }
    .btn-action { flex: 1; text-align: center; background: #1a2b4c; color: #fff; }
    .btn-danger { background: #fff; color: #c0392b; border-color: #c0392b; }
  </style>
</head>
<body>

  <div class="app-container">
    <h1>MAGIC CIRCLE ATELIER v4</h1>
    
    <div class="canvas-wrapper">
      <canvas id="magicCanvas"></canvas>
    </div>

    <div class="controls">
      <!-- 選択オブジェクトのインスペクター（調整スライダー） -->
      <div class="inspector disabled" id="inspectorPanel">
        <div style="font-weight:bold; margin-bottom:5px; font-size:0.85rem;">■ 選択中の図形を調整</div>
        <div class="slider-row">
          <span>大きさ</span>
          <input type="range" id="valScale" min="0.2" max="3.0" step="0.1" value="1">
        </div>
        <div class="slider-row">
          <span>矢の長さ</span>
          <input type="range" id="valLength" min="20" max="250" step="5" value="80">
        </div>
        <div class="slider-row">
          <span>回転角</span>
          <input type="range" id="valRotation" min="0" max="360" step="1" value="0">
        </div>
        <button class="btn btn-danger" id="btnDeleteSelected" style="width:100%; margin-top:5px;">選択を削除</button>
      </div>

      <div class="utils">
        <button class="btn btn-action" id="btnAlignArrows">矢を円形に均等配置</button>
        <button class="btn btn-danger" id="btnClear">全消去</button>
      </div>

      <div class="panel-title">陣 (外枠)</div>
      <div class="palette">
        <button class="btn" onclick="addElement('ring', 'normal')">陣を追加</button>
      </div>

      <div class="panel-title">紋 (中央・性質)</div>
      <div class="palette">
        <button class="btn" onclick="addElement('crest', 'fire')">炎</button>
        <button class="btn" onclick="addElement('crest', 'water')">水</button>
        <button class="btn" onclick="addElement('crest', 'wind')">風</button>
        <button class="btn" onclick="addElement('crest', 'earth')">大地</button>
        <button class="btn" onclick="addElement('crest', 'light')">光</button>
      </div>

      <div class="panel-title">矢 (周囲・形状)</div>
      <div class="palette">
        <button class="btn" onclick="addElement('arrow', 'pillar')">柱 (直進)</button>
        <button class="btn" onclick="addElement('arrow', 'float')">浮遊 (傘)</button>
        <button class="btn" onclick="addElement('arrow', 'converge')">収束 (内)</button>
        <button class="btn" onclick="addElement('arrow', 'scatter')">拡散 (枝)</button>
        <button class="btn" onclick="addElement('arrow', 'crush')">破砕 (雷)</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('magicCanvas');
    const ctx = canvas.getContext('2d');
    
    // Canvasのサイズを親要素に合わせる
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      drawScene();
    }
    window.addEventListener('resize', resizeCanvas);

    // --- オブジェクト管理 ---
    let elements = [];
    let selectedElement = null;
    let dragging = false;

    // --- 図形追加 ---
    function addElement(category, type) {
      const el = {
        id: Date.now(),
        category: category, // 'ring', 'crest', 'arrow'
        type: type,
        x: canvas.width / 2,
        y: canvas.height / 2,
        scale: 1.0,
        rotation: 0,
        length: category === 'arrow' ? 80 : 0 // 矢の場合のデフォルト長さ
      };
      
      // 追加時に少しずらす（重なり防止）
      el.x += (Math.random() * 20 - 10);
      el.y += (Math.random() * 20 - 10);

      elements.push(el);
      selectElement(el);
      drawScene();
    }

    // --- 描画パス定義（原作画像により忠実に） ---
    const drawPaths = {
      // 【陣】
      ring_normal: (ctx, el) => {
        const r = 100 * el.scale;
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, r * 0.92, 0, Math.PI * 2); ctx.stroke();
      },
      // 【紋】
      crest_fire: (ctx, el) => {
        const r = 25 * el.scale;
        // 炎：上向きの三角形と中心の線
        ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(-r*0.8, r*0.8); ctx.lineTo(r*0.8, r*0.8); ctx.closePath(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -r*0.2); ctx.lineTo(0, r*0.8); ctx.stroke();
      },
      crest_water: (ctx, el) => {
        const r = 25 * el.scale;
        // 水：S字が組み合わさった雫形
        ctx.beginPath(); 
        ctx.arc(0, -r*0.3, r*0.6, Math.PI, 0); 
        ctx.arc(0, r*0.3, r*0.6, 0, Math.PI); 
        ctx.stroke();
      },
      crest_wind: (ctx, el) => {
        const r = 25 * el.scale;
        // 風：螺旋・つむじ風
        ctx.beginPath(); ctx.arc(-r*0.2, 0, r*0.6, Math.PI/2, Math.PI*1.5); ctx.stroke();
        ctx.beginPath(); ctx.arc(r*0.2, 0, r*0.6, -Math.PI/2, Math.PI/2); ctx.stroke();
      },
      crest_earth: (ctx, el) => {
        const r = 25 * el.scale;
        // 大地：ひし形（上下三角）に横線
        ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(-r*0.8, 0); ctx.lineTo(0, r); ctx.lineTo(r*0.8, 0); ctx.closePath(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-r*0.4, -r*0.5); ctx.lineTo(r*0.4, -r*0.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-r*0.4, r*0.5); ctx.lineTo(r*0.4, r*0.5); ctx.stroke();
      },
      crest_light: (ctx, el) => {
        const r = 25 * el.scale;
        // 光：鋭い四芒星
        ctx.beginPath(); ctx.moveTo(0, -r*1.2); ctx.lineTo(-r*0.4, 0); ctx.lineTo(0, r*1.2); ctx.lineTo(r*0.4, 0); ctx.closePath(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-r*1.2, 0); ctx.lineTo(r*1.2, 0); ctx.stroke();
      },
      // 【矢】 (矢の根本が0,0になるように描画)
      arrow_pillar: (ctx, el) => {
        const l = el.length; const w = 15 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-w, -l); ctx.lineTo(w, -l); ctx.stroke();
      },
      arrow_float: (ctx, el) => {
        const l = el.length; const w = 20 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-w, -l); ctx.quadraticCurveTo(0, -l-w, w, -l); ctx.stroke(); // 傘のような曲線
      },
      arrow_converge: (ctx, el) => {
        const l = el.length; const w = 15 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-w, -l - w); ctx.lineTo(0, -l); ctx.lineTo(w, -l - w); ctx.stroke(); // 内向き三角
      },
      arrow_scatter: (ctx, el) => {
        const l = el.length; const w = 15 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l + w); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -l + w); ctx.lineTo(-w, -l); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -l + w); ctx.lineTo(w, -l); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -l + w); ctx.lineTo(0, -l - w*0.5); ctx.stroke();
      },
      arrow_crush: (ctx, el) => {
        const l = el.length; const w = 15 * el.scale;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -l + w*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -l + w*2); ctx.lineTo(-w, -l + w); ctx.lineTo(w, -l); ctx.lineTo(0, -l - w); ctx.stroke(); // ジグザグ
      }
    };

    // --- 描画メイン ---
    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // グリッド線
      ctx.strokeStyle = "rgba(212, 197, 176, 0.4)"; ctx.lineWidth = 1;
      for(let i=0; i<canvas.width; i+=20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

      ctx.lineCap = 'round'; ctx.lineJoin = 'round';

      elements.forEach(el => {
        ctx.save();
        ctx.translate(el.x, el.y);
        ctx.rotate(el.rotation * Math.PI / 180);

        // 選択中ハイライト
        const isSel = (selectedElement && selectedElement.id === el.id);
        if (isSel) {
          ctx.shadowBlur = 10;
          ctx.shadowColor = "#e74c3c";
          ctx.strokeStyle = "#e74c3c";
          // 掴める位置（原点）を赤丸で表示
          ctx.fillStyle = "rgba(231, 76, 60, 0.3)";
          ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
        } else {
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "#1a2b4c";
        }

        ctx.lineWidth = 2 * (el.category === 'ring' ? 1.5 : 1);
        
        // 描画実行
        const drawKey = `${el.category}_${el.type}`;
        if (drawPaths[drawKey]) drawPaths[drawKey](ctx, el);

        ctx.restore();
      });
    }

    // --- インスペクター（スライダー連動） ---
    const panel = document.getElementById('inspectorPanel');
    const sScale = document.getElementById('valScale');
    const sLength = document.getElementById('valLength');
    const sRot = document.getElementById('valRotation');

    function selectElement(el) {
      selectedElement = el;
      if (el) {
        panel.classList.remove('disabled');
        sScale.value = el.scale;
        sLength.value = el.length;
        sRot.value = el.rotation;
        sLength.disabled = (el.category !== 'arrow'); // 矢以外は長さを無効化
      } else {
        panel.classList.add('disabled');
      }
      drawScene();
    }

    sScale.oninput = e => { if(selectedElement) { selectedElement.scale = parseFloat(e.target.value); drawScene(); } };
    sLength.oninput = e => { if(selectedElement) { selectedElement.length = parseFloat(e.target.value); drawScene(); } };
    sRot.oninput = e => { if(selectedElement) { selectedElement.rotation = parseFloat(e.target.value); drawScene(); } };

    document.getElementById('btnDeleteSelected').onclick = () => {
      if (selectedElement) {
        elements = elements.filter(e => e.id !== selectedElement.id);
        selectElement(null);
      }
    };

    document.getElementById('btnClear').onclick = () => { elements = []; selectElement(null); };

    // --- 均等配置ロジック ---
    document.getElementById('btnAlignArrows').onclick = () => {
      // キャンバス中心を基準に矢を均等配置
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const arrows = elements.filter(e => e.category === 'arrow');
      if (arrows.length === 0) return;

      const angleStep = 360 / arrows.length;
      arrows.forEach((arr, i) => {
        arr.x = cx;
        arr.y = cy;
        arr.rotation = i * angleStep;
      });
      // 陣と紋も中心に寄せる
      elements.filter(e => e.category !== 'arrow').forEach(e => {
        e.x = cx; e.y = cy;
      });
      
      if(selectedElement) selectElement(selectedElement); // スライダー値更新
      drawScene();
    };

    // --- タッチ＆ドラッグ操作 ---
    function getEventPos(e) {
      const rect = canvas.getBoundingClientRect();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: cx - rect.left, y: cy - rect.top };
    }

    canvas.addEventListener('pointerdown', e => {
      const pos = getEventPos(e);
      let hit = null;
      // 描画順（配列の後ろ）から当たり判定
      for (let i = elements.length - 1; i >= 0; i--) {
        const el = elements[i];
        // 簡易当たり判定：要素の原点（x, y）からの距離
        // 矢は原点が根本なので、根本を掴んで動かせる
        const dist = Math.hypot(pos.x - el.x, pos.y - el.y);
        let hitRadius = 25; // つかみやすいように広め
        if (el.category === 'ring') hitRadius = 100 * el.scale; // 陣は広範囲で掴める
        
        if (dist < hitRadius) { hit = el; break; }
      }
      selectElement(hit);
      if (hit) dragging = true;
    });

    canvas.addEventListener('pointermove', e => {
      if (dragging && selectedElement) {
        const pos = getEventPos(e);
        selectedElement.x = pos.x;
        selectedElement.y = pos.y;
        drawScene();
      }
    });

    canvas.addEventListener('pointerup', () => { dragging = false; });
    canvas.addEventListener('pointerleave', () => { dragging = false; });

    // 初期化
    setTimeout(resizeCanvas, 100);
  </script>
</body>
</html>
